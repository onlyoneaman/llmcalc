name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install build

      - name: Lint
        run: python -m ruff check .

      - name: Type check
        run: python -m mypy llmcalc

      - name: Test
        run: python -m pytest

      - name: Build
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

  javascript:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: js

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Pack dry run
        run: npm pack --dry-run
